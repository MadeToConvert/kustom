<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kustom Checkout</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #f9f9f9; }
  </style>
</head>
<body>
  <script>
    var params = new URLSearchParams(window.location.search);
    var snippet = params.get('html_snippet');
    if (snippet) {
      document.open();
      document.write(snippet);
      document.close();
    }
  </script>
</body>
</html>
